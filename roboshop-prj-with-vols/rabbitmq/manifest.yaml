apiVersion: v1
kind: ConfigMap
metadata:
  namespace: roboshop
  name: rabbitmq-configmap
  labels:
    proj: roboshop
    env: dev
    deployment: kubernetes
    tier: db
data:
  RABBITMQ_DEFAULT_USER: "roboshop"
  RABBITMQ_DEFAULT_PASS: "roboshop123"
---
# First Configure the headless service
apiVersion: v1
kind: Service
metadata:
  namespace: roboshop
  name: rabbitmq-headless
  labels:
    proj: roboshop
    env: dev
    deployment: kubernetes
    tier: db
spec:
  clusterIP: None
  selector:
    proj: roboshop
    env: dev
    deployment: kubernetes
    tier: db
  ports:
    - protocol: "TCP"
      port: 5672
      targetPort: 5672
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  namespace: roboshop
  name: rabbitmq
  labels:
    proj: roboshop
    env: dev
    deployment: kubernetes
    tier: db
spec:
  serviceName: rabbitmq-headless
  selector:
    matchLabels:
      proj: roboshop
      env: dev
      deployment: kubernetes
      tier: db
  replicas: 1
  template:
    metadata:
      labels:
        proj: roboshop
        env: dev
        deployment: kubernetes
        tier: db
    spec:
      containers:
        - name: rabbitmq
          image: rakeshakuluru/rabbitmq:1.1.1
          imagePullPolicy: Always
          ports:
            - containerPort: 5672
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          envFrom:
            - configMapRef:
                name: rabbitmq-configmap
          volumeMounts:
          - name: rabbitmq-data
            mountPath: /var/lib/rabbitmq
  volumeClaimTemplates:
    - metadata:
        name: rabbitmq-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: ebs-dynamic-sc
        resources:
          requests:
            storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  namespace: roboshop
  name: rabbitmq
  labels:
    proj: roboshop
    env: dev
    deployment: kubernetes
    tier: db
spec:
  selector:
    proj: roboshop
    env: dev
    deployment: kubernetes
    tier: db
  ports:
    - protocol: "TCP"
      port: 5672
      targetPort: 5672
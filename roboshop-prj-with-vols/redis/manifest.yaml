# First Configure the headless service

apiVersion: v1
kind: Service
metadata:
  namespace: roboshop
  name: redis-headless
  labels:
    proj: roboshop
    env: dev
    deployment: kubernetes
    tier: db
spec:
  clusterIP: None
  selector:
    proj: roboshop
    env: dev
    deployment: kubernetes
    tier: db
  ports:
    - protocol: "TCP"
      port: 6379
      targetPort: 6379
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  namespace: roboshop
  name: redis
  labels:
    proj: roboshop
    env: dev
    deployment: kubernetes
    tier: db
spec:
  serviceName: redis-headless
  selector:
    matchLabels:
      proj: roboshop
      env: dev
      deployment: kubernetes
      tier: db
  replicas: 1
  template:
    metadata:
      labels:
        proj: roboshop
        env: dev
        deployment: kubernetes
        tier: db
    spec:
      containers:
        - name: redis
          image: rakeshakuluru/redis:1.1.1
          imagePullPolicy: Always
          ports:
            - containerPort: 6379
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          volumeMounts:
          - name: redis-data
            mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: redis-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: ebs-dynamic-sc
        resources:
          requests:
            storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  namespace: roboshop
  name: redis
  labels:
    proj: roboshop
    env: dev
    deployment: kubernetes
    tier: db
spec:
  selector:
    proj: roboshop
    env: dev
    deployment: kubernetes
    tier: db
  ports:
    - protocol: "TCP"
      port: 6379
      targetPort: 6379
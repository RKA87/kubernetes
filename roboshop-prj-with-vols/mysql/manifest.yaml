# First Configure the headless service
apiVersion: v1
kind: Service
metadata:
  namespace: roboshop
  name: mysql-headless
  labels:
    proj: roboshop
    env: dev
    deployment: kubernetes
    tier: db
spec:
  clusterIP: None
  selector:
    proj: roboshop
    env: dev
    deployment: kubernetes
    tier: db
  ports:
    - protocol: "TCP"
      port: 3306
      targetPort: 3306
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  namespace: roboshop
  name: mysql
  labels:
    proj: roboshop
    env: dev
    deployment: kubernetes
    tier: db
spec:
  serviceName: mysql-headless
  selector:
    matchLabels:
      proj: roboshop
      env: dev
      deployment: kubernetes
      tier: db
  replicas: 1
  template:
    metadata:
      labels:
        proj: roboshop
        env: dev
        deployment: kubernetes
        tier: db
    spec:
      containers:
        - name: mysql
          image: rakeshakuluru/mysql:1.1.1
          imagePullPolicy: Always
          ports:
            - containerPort: 3306
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          volumeMounts:
          - name: mysql-data
            mountPath: /var/lib/mysql
  volumeClaimTemplates:
    - metadata:
        name: mysql-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: ebs-dynamic-sc
        resources:
          requests:
            storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  namespace: roboshop
  name: mysql
  labels:
    proj: roboshop
    env: dev
    deployment: kubernetes
    tier: db
spec:
  selector:
    proj: roboshop
    env: dev
    deployment: kubernetes
    tier: db
  ports:
    - protocol: "TCP"
      port: 3306
      targetPort: 3306
apiVersion: v1
kind: ConfigMap
metadata:
  namespace: roboshop
  name: catalogue-configmap
  labels:
    proj: roboshop
    env: dev
    deployment: kubernetes
    tier: backend
data:
  MONGO: "true"
  MONGO_URL: "mongodb://mongodb:27017/catalogue"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: roboshop
  name: catalogue
  labels:
    proj: roboshop
    env: dev
    deployment: kubernetes
    tier: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      proj: roboshop
      env: dev
      deployment: kubernetes
      tier: backend
  template:
    metadata:
      labels:
        proj: roboshop
        env: dev
        deployment: kubernetes
        tier: backend
    spec:
      containers:
        - name: catalogue
          image: rakeshakuluru/catalogue:1.1.1
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: catalogue-configmap
          volumeMounts:
            - name: catalogue-data
              mountPath: /catalogue/data
      volumes:
        - name: catalogue-data
          persistentVolumeClaim:
            claimName: efs-dynamic-pvc
---
apiVersion: v1
kind: Service
metadata:
  namespace: roboshop
  name: catalogue
  labels:
    proj: roboshop
    env: dev
    deployment: kubernetes
    tier: backend
spec:
  selector:
    proj: roboshop
    env: dev
    deployment: kubernetes
    tier: backend
  ports:
    - port: 8080
      targetPort: 8080      
apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: roboshop
  name: payment
  labels:
    proj: roboshop
    env: dev
    deployment: kubernetes
    tier: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      proj: roboshop
      env: dev
      deployment: kubernetes
      tier: backend
  template:
    metadata:
      labels:
        proj: roboshop
        env: dev
        deployment: kubernetes
        tier: backend
    spec:
      containers:
      - name: payment
        image: rakeshakuluru/payment:1.1.1
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
        volumeMounts:
        - name: payment-data
          mountPath: /payment/data
      volumes:
        - name: payment-data
          persistentVolumeClaim:
            claimName: payment-pv-claim
---
apiVersion: v1
kind: Service
metadata:
  namespace: roboshop
  name: payment
  labels:
    proj: roboshop
    env: dev
    deployment: kubernetes
    tier: backend
spec:
  selector:
    proj: roboshop
    env: dev
    deployment: kubernetes
    tier: backend
  ports:
  - protocol: TCP
    port: 8080
    targetPort: 8080
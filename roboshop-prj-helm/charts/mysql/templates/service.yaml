# Headless Service for Statefulset deployment
apiVersion: v1
kind: Service
metadata:
  namespace: roboshop
  name: mysql-headless
  labels:
    proj: roboshop
    env: dev
    deployment: kubernetes
    app: mysql
spec:
  clusterIP: None
  selector:
    proj: roboshop
    env: dev
    deployment: kubernetes
    app: mysql
  ports:
    - protocol: TCP
      port: 3306
      targetPort: 3306
---
apiVersion: v1
kind: Service
metadata:
  namespace: roboshop
  name: mysql
  labels:
    proj: roboshop
    env: dev
    deployment: kubernetes
    app: mysql
spec:
  selector:
    proj: roboshop
    env: dev
    deployment: kubernetes
    app: mysql
  ports:
    - protocol: TCP
      port: 3306
      targetPort: 3306
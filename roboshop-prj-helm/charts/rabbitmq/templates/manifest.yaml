apiVersion: apps/v1
kind: StatefulSet
metadata:
  namespace: roboshop
  name: {{ .Values.statefulset.name}}
  labels:
    proj: roboshop
    env: dev
    deployment: kubernetes
    app: rabbitmq
spec:
  serviceName: rabbitmq-headless
  replicas: {{ .Values.statefulset.replicas }}
  selector:
    matchLabels:
      proj: roboshop
      env: dev
      deployment: kubernetes
      app: rabbitmq
  template:
    metadata:
      labels:
        proj: roboshop
        env: dev
        deployment: kubernetes
        app: rabbitmq
    spec:
      containers:
        - name: {{ .Values.statefulset.name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          ports:
            - containerPort: {{ .Values.statefulset.containerPort }}
          envFrom:
          - configMapRef:
              name: "{{ .Values.statefulset.name }}-configmap"
          volumeMounts:
            - name: "{{ .Values.statefulset.name }}-data"
              mountPath: /var/lib/rabbitmq
  volumeClaimTemplates:
  - metadata:
      name: "{{ .Values.statefulset.name }}-data"
    spec:
      accessModes: [ "ReadWriteOnce" ]
      storageClassName: ebs-dynamic-sc
      resources:
        requests:
          storage: 10Gi
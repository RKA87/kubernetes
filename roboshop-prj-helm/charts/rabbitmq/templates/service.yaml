apiVersion: v1
kind: Service
metadata:
  namespace: roboshop
  name: rabbitmq-headless
  labels:
    proj: roboshop
    env: dev
    deployment: kubernetes
    app: rabbitmq
spec:
  clusterIP: None
  selector:
    proj: roboshop
    env: dev
    deployment: kubernetes
    app: rabbitmq
  ports:
    - protocol: TCP
      port: 5672
      targetPort: 5672

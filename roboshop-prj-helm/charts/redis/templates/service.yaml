# Headless Service for Statefulset deployment
apiVersion: v1
kind: Service
metadata:
  namespace: roboshop
  name: redis-headless
  labels:
    proj: roboshop
    env: dev
    deployment: kubernetes
    app: redis
spec:
  clusterIP: None
  selector:
    proj: roboshop
    env: dev
    deployment: kubernetes
    app: redis
  ports:
    - protocol: TCP
      port: 6379
      targetPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  namespace: roboshop
  name: redis
  labels:
    proj: roboshop
    env: dev
    deployment: kubernetes
    app: redis
spec:
  selector:
    proj: roboshop
    env: dev
    deployment: kubernetes
    app: redis
  ports:
    - protocol: TCP
      port: 6379
      targetPort: 6379
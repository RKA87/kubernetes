apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: ebs-dynamic-sc
  labels:
    proj: roboshop
    env: dev
    deployment: kubernetes
provisioner: ebs.csi.aws.com
volumeBindingMode: WaitForFirstConsumer
parameters:
  type: gp3
  fsType: ext4
reclaimPolicy: Retain
---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: efs-dynamic-sc
  labels:
    proj: roboshop
    env: dev
    deployment: kubernetes
provisioner: efs.csi.aws.com
parameters:
  provisioningMode: efs-ap
  fileSystemId: fs-09c1f969797cacd3e
  directoryPerms: "700"
reclaimPolicy: Retain
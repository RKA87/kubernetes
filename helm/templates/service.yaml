apiVersion: v1
kind: Service
metadata:
  namespace: roboshop
  name: {{ .Values.deployment.name }}
  labels:
    app: webservices
    proj: roboshop
    env: dev
    deployment: kubernetes
spec:
  type: LoadBalancer
  selector:
    proj: roboshop
    env: dev
    deployment: kubernetes
  ports:
    - protocol: "TCP" 
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.containerPort }}
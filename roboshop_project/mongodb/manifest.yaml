apiVersion: v1
kind: Deployment
metadata:
  namespace: roboshop
  name: mongodb
  labels:
    app: mongodb
    proj: roboshop
    env: dev
    deployment: kubernetes
    tier: db
spec:
  replicas: 1
  selector:
    matchlabels:
      proj: roboshop
      env: dev
      deployment: kubernetes
      tier: db
  template:
    metadata:
      labels:
        proj: roboshop
        env: dev
        deployment: kubernetes
        tier: db
    spec:
      containers:
      - name: mongodb
        image: rakeshakuluru/mongodb:1.1.1
        imagePullPolicy: Always
        ports:
        - containerPort: 27017
      #   volumeMounts:
      #   - name: mongodb-storage
      #     mountPath: /data/db
      # volumes:
      # - name: mongodb-storage
      #   persistentVolumeClaim:
      #     claimName: mongodb-pvc
---
appVersion: v1
kind: Service
metadata:
  namespace: roboshop
  name: mongodb
  labels:
    app: mongodb
    proj: roboshop
    env: dev
    deployment: kubernetes
    tier: db
spec:
  type: ClusterIP
  selector:
    proj: roboshop
    env: dev
    deployment: kubernetes
    tier: db
  ports:
  - protocol: TCP
    port: 27017
    targetPort: 27017
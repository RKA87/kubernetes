apiVersion: v1
kind: ConfigMap
metadata:
  namespace: roboshop
  name: frontend-config
  labels:
    app: webserver
    proj: roboshop
    env: dev
    deployment: kubernetes
    tier: frontend
data:
  nginx.conf: |
      user nginx;
      worker_processes auto;
      error_log /var/log/nginx/error.log notice;
      pid /run/nginx.pid;

      include /usr/share/nginx/modules/*.conf;

      events {
          worker_connections 1024;
      }

      http {
          log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                            '$status $body_bytes_sent "$http_referer" '
                            '"$http_user_agent" "$http_x_forwarded_for"';

          access_log  /var/log/nginx/access.log  main;

          sendfile            on;
          tcp_nopush          on;
          keepalive_timeout   65;
          types_hash_max_size 4096;

          include             /etc/nginx/mime.types;
          default_type        application/octet-stream;

          include /etc/nginx/conf.d/*.conf;

          server {
              listen       80;
              listen       [::]:80;
              server_name  _;
              root         /usr/share/nginx/html;

              include /etc/nginx/default.d/*.conf;

              error_page 404 /404.html;
              location = /404.html {
              }

              error_page 500 502 503 504 /50x.html;
              location = /50x.html {
              }

              location /images/ {
                expires 5s;
                root   /usr/share/nginx/html;
                try_files $uri /images/placeholder.jpg;
              }
              location /api/catalogue/ { proxy_pass http://catalogue:8080/; }
              location /api/user/ { proxy_pass http://user:8080/; }
              location /api/cart/ { proxy_pass http://cart:8080/; }
              location /api/shipping/ { proxy_pass http://shipping:8080/; }
              location /api/payment/ { proxy_pass http://payment:8080/; }

              location /health {
                stub_status on;
                access_log off;
              }

          }
      }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: roboshop
  name: frontend
  labels:
    proj: roboshop
    env: dev
    deployment: kubernetes
    tier: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      proj: roboshop
      env: dev
      deployment: kubernetes
      tier: frontend
  template:
    metadata:
      labels:
        app: webserver
        proj: roboshop
        env: dev
        deployment: kubernetes
        tier: frontend
    spec:
      volumes:
      - name: frontend-config-vol
        configMap:
          name: frontend-config
      containers:
      - name: frontend
        image: rakeshakuluru/frontend:1.2.0
        ports:
        - containerPort: 80
        volumeMounts:
        - name: frontend-config-vol
          mountPath: "/etc/nginx/nginx.conf"
          subPath: nginx.conf
        resources:
          requests:
            cpu: "250m"
            memory: "64Mi"
          limits:
            cpu: "500m"
            memory: "128Mi"
        readinessProbe:
          tcpSocket: 
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  namespace: roboshop
  name: frontend
  labels:
    proj: roboshop
    env: dev
    deployment: kubernetes
    tier: frontend
spec:
  type: LoadBalancer
  selector:
    proj: roboshop
    env: dev
    deployment: kubernetes
    tier: frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
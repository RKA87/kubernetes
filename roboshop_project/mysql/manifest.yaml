apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: roboshop
  name: mysql
  labels:
    app: mysql
    proj: roboshop
    env: dev
    deployment: kubernetes
    tier: db
spec:
  replicas: 1
  selector:
    matchLabels:
      proj: roboshop
      env: dev
      deployment: kubernetes
      tier: db
  template:
    metadata:
      labels:
        app: mysql
        proj: roboshop
        env: dev
        deployment: kubernetes
        tier: db
    spec:
      containers:
      - name: mysql
        image: rakeshakuluru/mysql:1.1.1
        imagePullPolicy: Always
        ports:
        - containerPort: 3306
        # resources:
        #   requests:            
        #     cpu: "100m"
        #     memory: "256Mi"
        #   limits:
        #     cpu: "250m"
        #     memory: "512Mi"
        # livenessProbe:
        #   tcpSocket:
        #     port: 3306
        #   initialDelaySeconds: 30
        #   failureThreshold: 2
        #   periodSeconds: 10     
---
apiVersion: v1
kind: Service
metadata:
  namespace: roboshop
  name: mysql
  labels:
    app: mysql
    proj: roboshop
    env: dev
    deployment: kubernetes
    tier: db
spec:
  selector:
    proj: roboshop
    env: dev
    deployment: kubernetes
    tier: db
  ports:
  - protocol: TCP
    port: 3306
    targetPort: 3306
apiVersion: v1
kind: ConfigMap
metadata:
  namespace: roboshop
  name: dispatch
  labels:
    app: dispatch
    proj: roboshop
    env: dev
    deployment: kubernetes
    tier: backend
data:
    AMQP_HOST: "rabbitmq"
    AMQP_USER: "roboshop"
    AMQP_PASS: "roboshop123"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: roboshop
  name: dispatch
  labels:
    app: dispatch
    proj: roboshop
    env: dev
    deployment: kubernetes
    tier: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      proj: roboshop
      env: dev
      deployment: kubernetes
      tier: backend
  template:
    metadata:
      labels:
        app: dispatch
        proj: roboshop
        env: dev
        deployment: kubernetes
        tier: backend
    spec:
      containers:
      - name: dispatch
        image: rakeshakuluru/dispatch:1.1.1
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "250m"
            memory: "512Mi"
        readinessProbe:
          tcpSocket:
            port: 8080
          failureThreshold: 2
          periodSeconds: 10
          initialDelaySeconds: 15
        livenessProbe:
          tcpSocket:
              port: 8080
          failureThreshold: 2
          periodSeconds: 10
        envFrom:
        - configMapRef:
            name: dispatch
---
apiVersion: v1
kind: Service
metadata:
  namespace: roboshop
  name: dispatch
  labels:
    app: dispatch
    proj: roboshop
    env: dev
    deployment: kubernetes
    tier: backend
spec:
  selector:
    proj: roboshop
    env: dev
    deployment: kubernetes
    tier: backend
  ports:
  - protocol: TCP
    port: 8080
    targetPort: 8080
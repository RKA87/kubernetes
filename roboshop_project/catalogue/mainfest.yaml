apiVersion: v1
kind: ConfigMap
metadata:
  namespace: roboshop
  name: catalogue
  labels:
    app: catalogue
    proj: roboshop
    env: dev
    deployment: kubernetes
    tier: backend
  data:
    MONGO_URL: "mongodb://mongodb:27017/catalogue"
    MONGO: "true"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: roboshop
  name: catalogue
  labels:
    app: catalogue
    proj: roboshop
    env: dev
    deployment: kubernetes
    tier: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      proj: roboshop
      env: dev
      deployment: kubernetes
      tier: backend
  template:
    metadata:
      namespace: roboshop
      name: catalogue
      labels:
        app: catalogue
        proj: roboshop
        env: dev
        deployment: kubernetes
        tier: backend
    spec:
      containers:
      - name: catalogue
        image: rakeshakuluru/catalogue:1.1.1
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
        resources:
          requests:
            memory: "64Mi"
            cpu: "250m"
          limits:
            memory: "128Mi"
            cpu: "500m"
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          failureThreshold: 2
          periodSeconds: 10
        envFrom:
        - configMapRef:
            name: catalogue
---
apiVersion: v1
kind: Service
metadata:
  namespace: roboshop
  name: catalogue
  labels:
    app: catalogue
    proj: roboshop
    env: dev
    deployment: kubernetes
    tier: backend
spec:
  type: ClusterIP
  selector:
    proj: roboshop
    env: dev
    deployment: kubernetes
    tier: backend
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
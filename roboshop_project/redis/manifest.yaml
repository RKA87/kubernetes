apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: roboshop
  name: redis
  labels:
    app: redis
    proj: roboshop
    env: dev
    deployment: kubernetes
    tier: db
spec:
  replicas: 1
  selector:
    matchLabels:
      proj: roboshop
      env: dev
      deployment: kubernetes
      tier: db
  template:
    metadata:
      labels:
        app: redis
        proj: roboshop
        env: dev
        deployment: kubernetes
        tier: db
    spec:
      containers:
      - name: redis
        image: rakeshakuluru/redis:1.1.1
        imagePullPolicy: Always
        # resources:
        #   requests:
        #     memory: "128Mi"
        #     cpu: "100m"
        #   limits:
        #     memory: "128Mi"
        #     cpu: "100m"
        # livenessProbe:
        #   httpGet: 
        #     path: /health
        #     port: 80
        #   failureThreshold: 2
        #   periodSeconds: 10
        ports:
        - containerPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  namespace: roboshop
  name: redis
  labels:
    app: redis
    proj: roboshop
    env: dev
    deployment: kubernetes
    tier: db
spec:
  selector:
    proj: roboshop
    env: dev
    deployment: kubernetes
    tier: db
  ports:
  - protocol: TCP
    port: 6379
    targetPort: 6379
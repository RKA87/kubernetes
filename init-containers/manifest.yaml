apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: roboshop
  name: init-container
  labels:
    proj: roboshop
    env: dev
    deployment: k8s
    tier: init-container
spec:
  replicas: 1
  selector:
    matchLabels:
      tier: init-container
  template:
    metadata:
      labels:
        proj: roboshop
        env: dev
        deployment: k8s
        tier: init-container
    spec:
      serviceAccountName: mysql-secret-reader
      initContainers:
        - name: secret-reader
          image: amazon/aws-cli
          imagePullPolicy: Always
          command:
            - sh
            - -c
            - |
                aws secretsmanager get-secret-value --secret-id roboshop/dev/mysql_root_password \
                      --query SecretString --output text | jq -r .MYSQL_ROOT_PASSWORD > /secrets/mysql-secret-reader.txt
                echo "Secret placed successfully"
                cat /secrets/mysql-secret-reader.txt
          volumeMounts:
            - name: secret-reader
              mountPath: /secrets
      containers:
        - name: finalbuild
          image: rakeshakuluru/mysql:3.3.3
          imagePullPolicy: Always
          ports:
            - containerPort: 27017
          volumeMounts:
            - name: secret-reader
              mountPath: /secrets
      volumes:
        - name: secret-reader
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  namespace: roboshop
  name: initcontainer-svc
  labels:
    proj: roboshop
    env: dev
    deployment: k8s
    tier: init-container
spec:
  selector:
    tier: init-container
  ports:
    - port: 3306
      targetPort: 3306
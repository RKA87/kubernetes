apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: roboshop
  name: init-container
  labels:
    proj: roboshop
    env: dev
    deployment: k8s
    tier: init-container
spec:
  replicas: 1
  selector:
    matchLabels:
      tier: init-container
  template:
    metadata:
      labels:
        proj: roboshop
        env: dev
        deployment: k8s
        tier: init-container
    spec:
      serviceAccountName: mysql-secret-reader
      initContainers:
        - name: secret-reader
          image: amazon/aws-cli:latest
          imagePullPolicy: Always
          command:
            - sh
            - -c
            # FIXED: Removed the hyphen before "|" so YAML parses this as a single string block
            - |
                # FIXED: Replaced 'jq' with native 'sed' string extraction because the official aws-cli image lacks jq
                RAW_SECRET=$(aws secretsmanager get-secret-value --secret-id roboshop/dev/mysql_root_password-LC9wW5 --query SecretString --output text)
                echo "$RAW_SECRET" | sed -e 's/.*"MYSQL_ROOT_PASSWORD":"\([^"]*\)".*/\1/' > /secrets/mysql-secret-reader.txt
                echo "Secret placed successfully"
          volumeMounts:
            - name: secret-reader
              mountPath: /secrets
      containers:
        - name: finalbuild
          image: rakeshakuluru/mysql:3.3.3
          imagePullPolicy: Always
          ports:
            - containerPort: 3306 # FIXED: Changed from 27017 to 3306 to match standard MySQL database ports
          volumeMounts:
            - name: secret-reader
              mountPath: /secrets
      volumes:
        - name: secret-reader
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  namespace: roboshop
  name: initcontainer-svc
  labels:
    proj: roboshop
    env: dev
    deployment: k8s
    tier: init-container
spec:
  selector:
    tier: init-container
  ports:
    - port: 3306
      targetPort: 3306 # FIXED: This now perfectly points to containerPort 3306
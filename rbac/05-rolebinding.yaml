apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  namespace: roboshop
  name: test-role
  labels:
    proj: roboshop
    env: dev
    deployment: kubernetes
subjects:
  - kind: user
    name: ram
    apiGroup: rbac.authorization.k8s.io
  - kind: group
    name: group-name
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: Role
  name: test-role
  apiGroup: rbac.authorization.k8s.io
# First Create the persistent volume generated by storage admin
apiVersion: v1
kind: PersistentVolume
metadata:
  name: ebs-pv
  labels:
    app: ebs-demo
    proj: roboshop
    env: dev
    deployment: kubernetes
spec:
  capacity:
    storage: 5Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  csi:
    driver: ebs.csi.aws.com
    fsType: ext4
    volumeHandle: vol-052516247a4a4e158
---
# Now create the pvc claim
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  namespace: roboshop
  name: ebs-pvc
  labels:
    app: ebs-demo
    proj: roboshop
    env: dev
    deployment: kubernetes
spec:
  storageClassName: "" # Empty string must be explicitly set otherwise default StorageClass will be set
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  selector:
    matchLabels:
      proj: roboshop
      env: dev
      deployment: kubernetes
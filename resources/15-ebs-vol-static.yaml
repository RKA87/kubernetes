# First Create the persistent volume generated by storage admin
apiVersion: v1
kind: PersistentVolume
metadata:
  name: ebs-pv
  labels:
    app: ebs-demo
    proj: roboshop
    env: dev
    deployment: kubernetes
spec:
  capacity:
    storage: 5Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  csi:
    driver: ebs.csi.aws.com
    fsType: ext4
    volumeHandle: vol-052516247a4a4e158
---
# Now create the pvc claim
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  namespace: roboshop
  name: ebs-pvc
  labels:
    app: ebs-demo
    proj: roboshop
    env: dev
    deployment: kubernetes
spec:
  storageClassName: "" # Empty string must be explicitly set otherwise default StorageClass will be set
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  selector:
    matchLabels:
      proj: roboshop
      env: dev
      deployment: kubernetes
---
# Finally consume the pvc inside pod
apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: roboshop
  name: frontend-ebs
  labels:
    app: ebs-demo
    proj: roboshop
    env: dev
    deployment: kubernetes
spec:
  replicas: 1
  selector:
    matchLabels:
      proj: roboshop
      env: dev
      deployment: kubernetes
  template:
    metadata:
      labels:
        app: ebs-demo
        proj: roboshop
        env: dev
        deployment: kubernetes
    spec:
      containers:
      - name: frontend
        image: rakeshakuluru/frontend:1.1.1
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
        volumeMounts:
        - name: ebs-storage
          mountPath: /etc/nginx/nginx.conf
          subPath: nginx.conf
      nodeSelector:
        topology.kubernetes.io/zone: us-east-1d
      volumes:
      - name: ebs-storage
        persistentVolumeClaim:
          claimName: ebs-pvc
apiVersion: v1
kind: ConfigMap
metadata:
  namespace: roboshop
  name: nginx-configmap-file
  labels:
    proj: roboshop
    env: dev
    deployment: kubernetes
  data:
    nginx.conf: |
        events {
            worker_connections 1024;
        }

        http {
            upstream backend {
                server 127.0.0.1:8080;
            }

            server {
                listen 80;
                location / {
                    proxy_pass http://backend;
                }
            }
        }
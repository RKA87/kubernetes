apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: roboshop
  name: deployment
  labels:
    proj: roboshop
    env: dev
    purpose: deployment-poc
  annotations:
    kubernetes.io/change-cause: moving to nginx 1.29
spec:  
  replicas: 2
  selector:
    matchLabels:
        app: frontend
        proj: roboshop
        env: dev
        deployment: kubernetes
  template:
    metadata:
      labels:
        app: frontend
        proj: roboshop
        env: dev
        deployment: kubernetes
    spec:
      containers:
        - name: frontend
          image: nginx:1.29
          ports:
            - containerPort: 80
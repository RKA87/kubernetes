
apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: roboshop
  name: frontend
  labels:
    app: frontend
    proj: roboshop
    env: dev
    purpose: deployment-poc
  annotations:
    kubernetes.io/change-cause: moving to nginx 1.29
spec:  
  # replicas: 2
  selector:
    matchLabels:
        app: frontend
  template:
    metadata:
      labels:
        app: frontend
        proj: roboshop
        env: dev
        deployment: kubernetes
    spec:
      containers:
        - name: frontend
          image: nginx:1.29
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  namespace: roboshop
  name: frontend-hpa
  labels:
    proj: roboshop
    env: dev
    deployment: kubernetes
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: frontend #reference the deployment name as specified above to which hpa is attached
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 20
    - type: Resource
      resource: 
        name: memory
        target:
          type: Utilization
          averageUtilization: 50

# Note:
# Kubernetes uses default behavior for scale up and scale down when you don't explicitly configure them. 
# Still system will scale up & down the pods
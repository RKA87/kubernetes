# EBS Storage Dynamic to be configure
# First configure the storageclass

apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: ebs-dynamic-sc
  annotations:
    storageclass.kubernetes.io/is-default-class: "true" 
  labels:
    proj: roboshop
    env: dev
    deployment: kubernetes
provisioner: ebs.csi.aws.com
volumeBindingMode: WaitForFirstConsumer
parameters:
  type: gp3
  encrypted: "true"
  fsType: ext4
reclaimPolicy: Retain
allowedTopologies:
- matchLabelExpressions:
  - key: topology.kubernetes.io/zone
    values:
    - us-east-1a  # Change this to your specific AZ
---
# Now create the PVC to access this storage disk
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  namespace: roboshop
  name: ebs-dyamic-pvc
  labels:
    proj: roboshop
    env: dev
    deployment: kubernetes
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: ebs-dynamic-sc
  resources:
    requests:
      storage: 10Gi
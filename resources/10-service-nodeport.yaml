apiVersion: v1
kind: Service
metadata:
  namespace: roboshop
  name: service-nodeport
  labels:
    proj: roboshop
    env: dev
    deployment: kuberenetes
spec:
  type: NodePort
  ports:
    - port: 80
      targetPort: 80
      # Better to assign the nodeport as a static so that you can allow the port 30001 traffic in EC2 Nodes Security Group Inbound rule
      nodePort: 30001 
  selector:
    proj: roboshop
    env: dev
    deployment: kubernetes

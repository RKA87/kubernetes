apiVersion: v1
kind: Service
metadata:
  namespace: roboshop
  name: service-config-frontend
  labels:
    app: config-frontend
    proj: roboshop
    env: dev
spec:
  selector:
    proj: roboshop
    env: dev
  ports:
    - protocol: TCP
      port: 80 #port is for service
      targetPort: 80 # port is for container
